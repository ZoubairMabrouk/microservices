name: Reusable .NET build
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string    
      service-path:
        required: true
        type: string
      solution-file:
        required: true
        type: string
      env-var-name:
        required: true
        type: string
    secrets:
      GHCR_TOKEN:
        required: true
      DEPLOY_REPO_TOKEN:
        required: true
env:
  DOTNET_VERSION: "8.0.x"

jobs:
  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        working-directory: ${{ inputs.service-path }}
        run: dotnet restore ${{ inputs.solution-file }}
      - name: Build verification
        working-directory: ${{ inputs.service-path }}
        run: |
          dotnet build \
            ${{ inputs.solution-file }} \
            --configuration Release \
            --no-restore
      - name: Run unit tests
        working-directory: ${{ inputs.service-path }}
        run: |
          dotnet test \
            ${{ inputs.solution-file }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.service-name }}
          path: |
            ${{ inputs.service-path }}/**/*.trx
          retention-days: 30

  # =========================================================
  # BUILD & DEPLOY
  # =========================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    needs: code-quality

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # VERSIONING
      # =====================================================
      - name: Resolve version
        id: version
        run: |
          if git describe --tags --exact-match >/dev/null 2>&1; then
            VERSION=$(git describe --tags --exact-match | sed 's/^v//')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      # =====================================================
      # DOCKER LOGIN
      # =====================================================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # =====================================================
      # BUILDX
      # =====================================================
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =====================================================
      # BUILD & PUSH
      # =====================================================
      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service-path }}
          file: ${{ inputs.service-path }}/Dockerfile

          platforms: linux/amd64,linux/arm64

          push: true

          tags: |
            ghcr.io/zoubairmabrouk/${{ inputs.service-name }}:${{ steps.version.outputs.version }}
            ghcr.io/zoubairmabrouk/${{ inputs.service-name }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =====================================================
      # UPDATE INFRA REPO
      # =====================================================
      - name: Update infra-deploy repository
        run: |

          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/ZoubairMabrouk/infra-deploy.git

          cd infra-deploy

          sed -i "s/^${{ inputs.env-var-name }}=.*/${{ inputs.env-var-name }}=${{ steps.version.outputs.version }}/" .env.prod

          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"

          git add .env.prod

          git diff --staged --quiet && echo "No changes detected" && exit 0

          git commit -m "${{ inputs.service-name }}): bump image to ${{ steps.version.outputs.version }}"

          git push
name: conv-service

on:
  push:
    branches: [main, master]
    paths:
      - 'conversation-history-service/**'
      - '.github/workflows/conv-service.yml'
  pull_request:
    paths:
      - 'conversation-history-service/**'

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-dotnet.yml
    with:
      service-name: conv-service
      service-path: conversation-history-service/
      env-var-name: CONV_VERSION
    secrets:
      GHCR_TOKEN:    ${{ secrets.GHCR_TOKEN }}
      DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
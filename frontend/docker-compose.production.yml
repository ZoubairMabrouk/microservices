# ============================================================
# docker-compose.production.yml
# Orchestration complète des microservices en production
# VPS Ubuntu — /opt/microservices/docker-compose.yml
#
# Services :
#   - nginx             : Reverse proxy / Load balancer
#   - frontend          : React (Business Pulse)
#   - api-gateway       : YARP .NET — Point d entrée unique
#   - auth-service      : Authentification JWT
#   - chat-service      : LLM / Chat (Python)
#   - mdx-service       : MDX Processing (Python)
#   - audit-service     : Historique / Audit (.NET)
#   - rabbitmq          : Message Broker asynchrone
#   - sqlserver         : Base de données SQL Server
#   - postgres          : Base de données PostgreSQL
#   - redis             : Cache distribué
# ============================================================

name: microservices-prod

# ─────────────────────────────────────────────
# RÉSEAUX : Isolation par couche
# ─────────────────────────────────────────────
networks:
  # Réseau public : uniquement Nginx ↔ services frontend
  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Réseau interne : communication inter-services
  internal-net:
    driver: bridge
    internal: true           # Pas d accès internet direct
    ipam:
      config:
        - subnet: 172.21.0.0/24

  # Réseau dédié aux bases de données
  db-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24

# ─────────────────────────────────────────────
# VOLUMES : Persistance des données
# ─────────────────────────────────────────────
volumes:
  sqlserver-data:
    driver: local
  postgres-data:
    driver: local
  rabbitmq-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  letsencrypt-certs:
    driver: local

# ─────────────────────────────────────────────
# CONFIGURATION COMMUNE (extension YAML)
# ─────────────────────────────────────────────
x-common-settings: &common-settings
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"
  security_opt:
    - no-new-privileges:true

x-healthcheck-defaults: &hc-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# ─────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────
services:

  # ═══════════════════════════════════════════
  # NGINX — Reverse Proxy / SSL Termination
  # ═══════════════════════════════════════════
  nginx:
    <<: *common-settings
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt-certs:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    networks:
      - public-net
      - internal-net
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nginx", "-t"]

  # ═══════════════════════════════════════════
  # FRONTEND — React (Business Pulse)
  # ═══════════════════════════════════════════
  frontend:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/business-pulse-frontend:latest
    container_name: frontend
    environment:
      - VITE_API_URL=https://api.yourdomain.com
      - VITE_ENV=production
    networks:
      - public-net
    expose:
      - "80"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ═══════════════════════════════════════════
  # API GATEWAY — YARP .NET
  # Point d entrée unique pour tous les microservices
  # ═══════════════════════════════════════════
  api-gateway:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/api-gateway:latest
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # URLs des microservices en aval (via réseau Docker interne)
      - ReverseProxy__Clusters__auth__Destinations__destination1__Address=http://auth-service:8080
      - ReverseProxy__Clusters__chat__Destinations__destination1__Address=http://chat-service:8080
      - ReverseProxy__Clusters__mdx__Destinations__destination1__Address=http://mdx-service:8080
      - ReverseProxy__Clusters__audit__Destinations__destination1__Address=http://audit-service:8080
    networks:
      - public-net
      - internal-net
    expose:
      - "8080"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ═══════════════════════════════════════════
  # AUTH SERVICE — .NET (JWT / OAuth2)
  # ═══════════════════════════════════════════
  auth-service:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/auth-service:latest
    container_name: auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuthDB;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=https://api.yourdomain.com
      - Jwt__Audience=business-pulse
      - Jwt__ExpirationMinutes=60
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD}
    networks:
      - internal-net
      - db-net
    expose:
      - "8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ═══════════════════════════════════════════
  # CHAT SERVICE — Python (LLM / RAG)
  # ═══════════════════════════════════════════
  chat-service:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/chat-service:latest
    container_name: chat-service
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://chatuser:${PG_CHAT_PASSWORD}@postgres:5432/chatdb
      - RABBITMQ_URL=amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET_KEY}
    networks:
      - internal-net
      - db-net
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G     # LLM peut consommer plus de mémoire

  # ═══════════════════════════════════════════
  # MDX SERVICE — Python
  # ═══════════════════════════════════════════
  mdx-service:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/mdx-service:latest
    container_name: mdx-service
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://mdxuser:${PG_MDX_PASSWORD}@postgres:5432/mdxdb
      - RABBITMQ_URL=amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET_KEY}
    networks:
      - internal-net
      - db-net
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ═══════════════════════════════════════════
  # AUDIT SERVICE — .NET (Historique Conversations)
  # ═══════════════════════════════════════════
  audit-service:
    <<: *common-settings
    image: ghcr.io/zoubairmabrouk/audit-service:latest
    container_name: audit-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=auditdb;Username=audituser;Password=${PG_AUDIT_PASSWORD}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
    networks:
      - internal-net
      - db-net
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ═══════════════════════════════════════════
  # RABBITMQ — Message Broker
  # ═══════════════════════════════════════════
  rabbitmq:
    <<: *common-settings
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=/
      # Erlang cookie pour le clustering futur
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - internal-net
    expose:
      - "5672"     # AMQP
      - "15672"    # Management UI (désactiver en prod ou filtrer via Nginx)
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      start_period: 60s

  # ═══════════════════════════════════════════
  # SQL SERVER — Auth Service DB
  # ═══════════════════════════════════════════
  sqlserver:
    <<: *common-settings
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express           # Ou Developer / Standard
      - MSSQL_COLLATION=SQL_Latin1_General_CP1_CI_AS
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./scripts/sql/init-auth-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - db-net
    expose:
      - "1433"
    healthcheck:
      <<: *hc-defaults
      test: |
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" -b
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ═══════════════════════════════════════════
  # POSTGRESQL — Chat, MDX, Audit Services
  # ═══════════════════════════════════════════
  postgres:
    <<: *common-settings
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${PG_ADMIN_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Scripts d initialisation (ordre alphabétique)
      - ./scripts/postgres/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
      - ./scripts/postgres/02-create-users.sql:/docker-entrypoint-initdb.d/02-create-users.sql:ro
    networks:
      - db-net
    expose:
      - "5432"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U admin"]
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ═══════════════════════════════════════════
  # REDIS — Cache distribué / Sessions
  # ═══════════════════════════════════════════
  redis:
    <<: *common-settings
    image: redis:7.2-alpine
    container_name: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly no
    volumes:
      - redis-data:/data
    networks:
      - internal-net
      - db-net
    expose:
      - "6379"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
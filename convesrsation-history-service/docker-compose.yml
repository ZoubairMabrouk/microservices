services:

  conversationservice:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/zoubairmabrouk/conversationservice:latest
    container_name: conversationservice

    restart: always

    ports:
      - "8085:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Production

      ConnectionStrings__DefaultConnection: >
        Server=sqlserver;
        Database=ConversationDb;
        User Id=sa;
        Password=pfe-ing-2026;
        TrustServerCertificate=true;

      Jwt__Key: qsjhdhqsdhhuzhdhdgeudgudsgv,nfkuhzgezfuvjhknfjhsdbgvsqjhvvudsdfhvfuzbhjdqsjbddahugfu
      Jwt__Issuer: AUTH-Sevice
      Jwt__Audience: platform-services

    depends_on:
      - sqlserver

    networks:
      - platform-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: conversation-db

    restart: always

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "pfe-ing-2026"

    ports:
      - "1435:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

    networks:
      - platform-network

volumes:
  sqlserver_data:

networks:
  platform-network:
    driver: bridge
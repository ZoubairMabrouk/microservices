# Configuration SonarCloud pour ConversationService
# Voir: https://docs.sonarcloud.io/getting-started/github/

sonar.projectKey=YOUR_ORGANIZATION_ConversationService
sonar.organization=YOUR_ORGANIZATION
sonar.projectName=ConversationService
sonar.projectVersion=1.0

# Répertoires source
sonar.sources=.
sonar.exclusions=**/*Tests/**,**/bin/**,**/obj/**,**/.git/**

# Tests
sonar.tests=Tests
sonar.test.inclusions=Tests/**/*Tests.cs

# Couverture de code
sonar.coverageReportPaths=coverage.opencover.xml

# Règles de qualité
sonar.qualitygate.wait=true

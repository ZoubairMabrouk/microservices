version: '3.9'

services:

  conversationservice:
    image: ghcr.io/zoubairmabrouk/conversationservice:latest
    container_name: conversationservice-staging

    restart: always

    ports:
      - "8086:8088"

    environment:
      ASPNETCORE_ENVIRONMENT: Staging

      ConnectionStrings__DefaultConnection: >
        Server=sqlserver;
        Database=ConversationDb_Staging;
        User Id=sa;
        Password=pfe-ing-2026;
        TrustServerCertificate=true;

      Jwt__Key: qsjhdhqsdhhuzhdhdgeudgudsgv,nfkuhzgezfuvjhknfjhsdbgvsqjhvvudsdfhvfuzbhjdqsjbddahugfu
      Jwt__Issuer: ConversationService
      Jwt__Audience: ConversationServiceUsers

    depends_on:
      - sqlserver

    networks:
      - backend-staging

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: conversation-db-staging

    restart: always

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "pfe-ing-2026"
      MSSQL_PID: Express

    ports:
      - "1436:1433"

    volumes:
      - sqlserver_data_staging:/var/opt/mssql

    networks:
      - backend-staging

    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "pfe-ing-2026" -Q "SELECT 1"
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  backend-staging:
    driver: bridge

volumes:
  sqlserver_data_staging:
    driver: local

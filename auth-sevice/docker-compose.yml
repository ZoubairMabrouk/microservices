version: '3.9' 
services: 
  auth-service: 
    build: 
      context: . 
      dockerfile: Dockerfile
    restart: always 
    ports: 
      - "8084:8080" 
    environment: 
      ASPNETCORE_ENVIRONMENT: Production 
      ASPNETCORE_URLS: http://+:8080 
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=auth_service_db;User Id=sa;Password=Zoubair@2026;TrustServerCertificate=True;Encrypt=False;" 
      Jwt__SecretKey: "qsjhdhqsdhhuzhdhdgeudgudsgv,nfkuhzgezfuvjhknfjhsdbgvsqjhvvudsdfhvfuzbhjdqsjbddahugfu" 
      Jwt__Issuer: "AUTH-Sevice" 
      Jwt__Audience: "platform-services" 
    depends_on: 
      - sqlserver 
    networks: 
      - platform-network
  sqlserver: 
    image: mcr.microsoft.com/mssql/server:2022-latest 
    container_name: sqlserver 
    hostname: sqlserver 
    restart: always 
    environment: 
      ACCEPT_EULA: "Y" 
      SA_PASSWORD: "Zoubair@2026" 
    ports: 
      - "1436:1433" 
    volumes: 
      - sqlserver_data:/var/opt/mssql 
    networks: 
      - platform-network 
volumes: 
  sqlserver_data: 
networks: 
  platform-network: 
    driver: bridge
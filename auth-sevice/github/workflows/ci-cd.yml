name: Deploy-G-Consulting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🚀 Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     22
          debug:    true
          timeout:  30s
          script: |
            set -e
            cd /opt/PROJET/G-Consulting
            
            echo "🔄 Pulling latest code..."
            git fetch --prune --quiet
            git reset --hard origin/main
            git clean -fdx
            
            echo "⚙️ Building and restarting Docker containers..."
            COMPOSE_PROJECT_NAME=g-consulting docker compose build --no-cache --pull
            COMPOSE_PROJECT_NAME=g-consulting docker compose up -d --force-recreate --build
            
            echo "✅ Deployed commit $(git rev-parse --short HEAD)"
      
      - name: ✅ Telegram success (User 1)
        if: success()
        uses: appleboy/telegram-action@v0.1.0
        with:
          to:       ${{ secrets.TG_CHAT_ID }}
          token:    ${{ secrets.TG_TOKEN }}
          format:   html
          message: |
            <b>🟢 Déploiement G-Consulting réussi</b>
            
            <b>SHA :</b> <code>${{ github.sha }}</code>
            
            <b>Auteur :</b> <code>${{ github.actor }}</code>
            
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Voir logs ↗︎</a>
      
      - name: ✅ Telegram success (User 2)
        if: success()
        uses: appleboy/telegram-action@v0.1.0
        with:
          to:       ${{ secrets.TG_CHAT_ID_1 }}
          token:    ${{ secrets.TG_TOKEN_1 }}
          format:   html
          message: |
            <b>🟢 Déploiement G-Consulting réussi</b>
            
            <b>SHA :</b> <code>${{ github.sha }}</code>
            
            <b>Auteur :</b> <code>${{ github.actor }}</code>
            
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Voir logs ↗︎</a>
      
      - name: 🔴 Telegram failure (User 1)
        if: failure()
        uses: appleboy/telegram-action@v0.1.0
        with:
          to:       ${{ secrets.TG_CHAT_ID }}
          token:    ${{ secrets.TG_TOKEN }}
          format:   html
          message: |
            <b>🔴 Échec du déploiement G-Consulting</b>
            
            <b>SHA :</b> <code>${{ github.sha }}</code>
            
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Logs ↗︎</a>
      
      - name: 🔴 Telegram failure (User 2)
        if: failure()
        uses: appleboy/telegram-action@v0.1.0
        with:
          to:       ${{ secrets.TG_CHAT_ID_1 }}
          token:    ${{ secrets.TG_TOKEN_1 }}
          format:   html
          message: |
            <b>🔴 Échec du déploiement G-Consulting</b>
            
            <b>SHA :</b> <code>${{ github.sha }}</code>
            
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Logs ↗︎</a>